services:
  - type: web
    name: skillarena-backend
    env: node
    plan: free
    buildCommand: npm ci --only=production
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FRONTEND_URL
        value: https://skillarena-frontend-two.vercel.app
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PLATFORM_FEE_PERCENT
        value: 10%
    # Required for WebSocket support on Render free tier
    # Note: Free tier has some limitations with WebSockets (may spin down after inactivity)
    # Consider upgrading to paid plan for production WebSocket usage
